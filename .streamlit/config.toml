[server]
enableCORS = false
enableXsrfProtection = false
headless = true

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[theme]
# No forzar base dark/light — el código Python gestiona el tema dinámicamente
# vía inject_styles() en ui/styles.py que inyecta color-scheme + bg_card
# para html, body y [data-baseweb="layer"] (portals de dropdown).
primaryColor = "#c9a227"
font = "sans serif"
